<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawCare Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e6d3c0;
}

/* FULLSCREEN CONTAINER */
.container {
    width: 100%;
    min-height: 100vh;
    padding: 40px 20px;
    text-align: center;
}

/* LOGO */
.logo-box {
    width: 80px;
    height: 80px;
    background: #f7943d;
    margin: 40px auto 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
}

/* TEXT */
h1 {
    margin: 5px 0;
}

.subtitle {
    font-size: 13px;
    color: #555;
    margin-bottom: 30px;
}

/* CARD (UPDATED SIZE) */
.card {
    background: #e3e3e3;
    padding: 35px;              /* increased padding */
    border-radius: 20px;
    border: 2px solid #f7943d;
    text-align: left;
    max-width: 480px;          /* increased width */
    margin: 0 auto;
}

.card h2 {
    text-align: center;
}

/* FORM */
label {
    font-size: 13px;
    display: block;
    margin-top: 12px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    margin-top: 5px;
}

/* BUTTON */
.btn {
    display: block;
    text-align: center;
    text-decoration: none;
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    background: #f7943d;
    border-radius: 12px;
    color: white;
    font-weight: bold;
}

/* FOOTER */
.footer {
    font-size: 12px;
    margin-top: 25px;
    text-align: center;
}
</style>

</head>

<body>

<div class="container">
    <div class="logo-box">🐾</div>
    <h1>PawCare</h1>
    <div class="subtitle">Your Pet's Best Friend</div>

    <div class="card">
        <h2>Welcome Back!</h2>

        <label>Email</label>
        <input type="text">

        <label>Password</label>
        <input type="password">

        <a href="petshop2.html" class="btn">Sign in</a>
    </div>

    <div class="footer">
        By signing in, you agree to our Terms & Privacy Policy
    </div>
</div>

</body>
</html>
